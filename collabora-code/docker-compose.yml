---
services:
  collabora:
    container_name: collabora
    image: docker.io/collabora/code
    env_file: .env

    volumes:
      - ./coolwsd.xml:/etc/coolwsd/coolwsd.xml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collabora.entrypoints=websecure"
      - "traefik.http.routers.collabora.rule=Host(`office-zbjyb.mckay.one`)"
      - "traefik.http.routers.collabora.tls=true"
      - "traefik.http.routers.collabora.tls.certresolver=cf"
      - "traefik.http.services.collabora.loadbalancer.server.scheme=https"
    networks:
      - proxy
    restart: unless-stopped
    cap_add:
      - "MKNOD"


networks:
  proxy:
    external: true
