http:
  routers:
    minio-console:
      rule: "Host(`s3-console.mckay.one`)"
      entrypoints:
      - "websecure"
      service: minio-console
      tls:
        certresolver: cf
    minio-server:
      rule: "Host(`s3.mckay.one`)"
      entrypoints:
      - "websecure"
      service: minio-s3
      tls:
       certresolver: cf
    ambrose:
      rule: "Host(`ambrose.mckay.one`)"
      entryPoints:
      - "websecure"
      service: ambrose
      tls:
        certresolver: cf
    omada-controller:
      rule: "Host(`omada.mckay.one`)"
      entryPoints:
      - "websecure"
      service: omada
      tls:
        certresolver: cf
    home-assistant:
      rule: "Host(`hass.mckay.one`)"
      entrypoints:
      - "websecure"
      service: home-assist
      tls:
        certresolver: cf


  services:
    minio-console:
     loadBalancer:
       servers:
         - url: "https://10.10.0.3:9002"
    minio-s3:
      loadBalancer:
        servers:
          - url: "https://10.10.0.3:9000"
    omada:
      loadBalancer:
        servers:
          - url: "https://10.10.1.6:2006"
    ambrose:
      loadBalancer:
        servers:
          - url: "https://10.10.0.235:8006"
    home-assist:
      loadBalancer:
        servers:
          - url: http://10.10.1.4

  middlewares:
    authentik:
      forwardauth:
        address: http://authentik_server_1:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
        # headers:
        #   customResponseHeaders:
        #     X-Authentik-Groups: ""

