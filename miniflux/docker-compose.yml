services:
  miniflux:
    container_name: miniflux
    image: ghcr.io/miniflux/miniflux:2.2.3
    env_file: .env
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.miniflux.entrypoints=websecure
      - traefik.http.routers.miniflux.rule=Host(`feed.mckay.one`)
      - traefik.http.routers.miniflux.tls=true
      - traefik.http.routers.miniflux.tls.certresolver=cf
    networks:
      - proxy
      - miniflux
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: miniflux_postgress_db
    image: docker.io/postgres:17-alpine
    env_file: .env
    volumes:
      - miniflux-db:/var/lib/postgresql/data
    networks:
      - miniflux
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -U
        - miniflux
      interval: 10s
      start_period: 30s

volumes:
  miniflux-db: null
networks:
  proxy:
    external: true
