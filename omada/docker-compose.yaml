---
services:
  app:
    image: docker.io/mbentley/omada-controller:6.0
    envfile: .env
    volumes:
      - data:/opt/tplink/EAPController/data
      - logs:/opt/tplink/EAPController/logs
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    stop_grace_period: 60s
    network_mode: host

volumes:
  data:
  logs:
